<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskTrace | Professional Project Tracking</title>

  <!-- Primary Meta Tags -->
  <meta name="title" content="TaskTrace | Professional Project Tracking">
  <meta name="description"
    content="A premium real-time project management dashboard with a modern glassmorphism design. Track tasks and manage teams with ease.">
  <meta name="theme-color" content="#030712">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tasktrace-todo.web.app">
  <meta property="og:title" content="TaskTrace | Professional Project Tracking">
  <meta property="og:description"
    content="A premium real-time project management dashboard with a modern glassmorphism design. Track tasks and manage teams with ease.">
  <meta property="og:image" content="https://tasktrace-todo.web.app/images/SocialPreview.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://tasktrace-todo.web.app">
  <meta property="twitter:title" content="TaskTrace | Professional Project Tracking">
  <meta property="twitter:description"
    content="A premium real-time project management dashboard with a modern glassmorphism design. Track tasks and manage teams with ease.">
  <meta property="twitter:image" content="https://tasktrace-todo.web.app/images/SocialPreview.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>


  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen overflow-x-hidden">
  <!-- Shared components (Overlay, Nav, Footer, Modals) injected via common.js -->

  <div class="relative w-full overflow-hidden pt-32">
    <!-- Project Selection View -->
    <div id="project-view" class="view-transition view-visible flex flex-col items-center min-h-screen p-6 pb-20 mt-10">
      <div class="w-full max-w-7xl mx-auto mb-10 md:mb-16 flex flex-col items-start px-4 md:px-6">
        <h2 class="text-4xl md:text-7xl font-black tracking-tighter mb-4">Projects</h2>
        <p class="text-gray-500 font-medium italic text-base md:text-xl mb-12">Select a workspace to begin tracking Main Tasks</p>
        
        <button onclick="openGenericModal('project')"
          class="group flex items-center space-x-3 px-6 md:px-10 py-4 md:py-6 bg-white/5 hover:bg-white/10 rounded-2xl md:rounded-[32px] border border-white/10 transition-all duration-500 shadow-2xl active:scale-95">
          <div class="w-6 h-6 md:w-8 md:h-8 rounded-lg bg-cyan-500/10 flex items-center justify-center text-cyan-500 group-hover:rotate-90 transition-all duration-500">
            <i data-lucide="plus" class="w-4 h-4 md:w-5 md:h-5"></i>
          </div>
          <span class="text-xs md:text-sm font-black uppercase tracking-[0.2em]">Initiate Project</span>
        </button>
      </div>

      <div id="project-grid"
        class="grid grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8 w-full max-w-7xl mx-auto px-4 md:px-6 items-start">
        <!-- Projects injected here -->
      </div>
    </div>
  </div>

  <!-- Shared components injected via common.js -->

  <!-- Scripts -->
  <script src="js/firebase-app.js"></script>
  <script src="js/common.js"></script>
  <script src="js/projects.js"></script>
</body>

</html>
